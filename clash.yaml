# ====================================================================
# 5. 分流规则
# ====================================================================
rules:
  # 检测站放最前，避免被 direct / cncidr / GEOIP 抢走。
  - DOMAIN-SUFFIX,net.coffee,Tixxin-ISP
  - DOMAIN-SUFFIX,dnsleaktest.com,Tixxin-ISP
  - DOMAIN-SUFFIX,browserleaks.com,Tixxin-ISP
  - DOMAIN-SUFFIX,ipleak.net,Tixxin-ISP
  - DOMAIN-SUFFIX,ip138.com,Tixxin-ISP
  - DOMAIN-SUFFIX,ipip.net,Tixxin-ISP
  - DOMAIN-SUFFIX,ip.sb,Tixxin-ISP
  - DOMAIN-SUFFIX,ifconfig.me,Tixxin-ISP
  - DOMAIN-SUFFIX,whoer.net,Tixxin-ISP

  # AI 平台全部走住宅 ISP。
  - RULE-SET,tixxin-ai-core,Tixxin-ISP
  - RULE-SET,ai-openai,Tixxin-ISP
  - RULE-SET,ai-anthropic,Tixxin-ISP
  - RULE-SET,tixxin-ip-check,Tixxin-ISP

  # 本地 / 局域网永远直连。
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT
  - RULE-SET,tixxin-lan,DIRECT

  # 游戏 / 加速器 / 反作弊优先直连，放在 WebRTC 阻断之前，避免误伤游戏 UDP。
  - RULE-SET,tixxin-game-direct,DIRECT

  # Steam 全量直连。
  - RULE-SET,tixxin-steam-direct,DIRECT
  - RULE-SET,steam,DIRECT
  - RULE-SET,steam-cn,DIRECT

  # 常见浏览器 WebRTC / STUN 泄露防护。
  - RULE-SET,tixxin-webrtc-block,REJECT

  # 国内应用和常见国内域名直连。
  - RULE-SET,applications,DIRECT
  - RULE-SET,tixxin-cn-direct,DIRECT

  # 广告和跟踪拦截。
  - RULE-SET,reject,REJECT

  # 国内优先直连，普通国外走 BWG。
  - RULE-SET,direct,DIRECT
  - RULE-SET,cncidr,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - RULE-SET,Adobe,Tixxin
  - RULE-SET,proxy,Tixxin

  # 最终兜底走 BWG，不提供 DIRECT 兜底。
  - MATCH,漏网之鱼
