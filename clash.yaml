# ====================================================================
# Clash Party / Mihomo optimized profile
# 目标：
# 1. ChatGPT / Codex / Claude / Anthropic 全部走住宅 ISP 出口 BWGISP
# 2. 其它国外流量默认走 BWG 机房出口
# 3. 国内网站、国内应用、国内游戏、PUBG、Steam 全部直连
# 4. TUN + fake-ip + DNS 分流，降低 DNS / WebRTC 泄露概率
# ====================================================================

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

# Clash Party 如果已经在界面里启用 TUN，也建议保持这些核心参数一致。
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  mtu: 1500
  dns-hijack:
    - any:53
    - tcp://any:53

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
  force-domain:
    - "+.openai.com"
    - "+.chatgpt.com"
    - "+.anthropic.com"
    - "+.claude.ai"
    - "+.claude.com"
  skip-domain:
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.steamcontent.com"
    - "+.steamserver.net"
    - "+.pubg.com"
    - "+.krafton.com"

# ====================================================================
# 1. 节点配置
# ====================================================================
proxies:
  - name: BWGISP
    type: vless
    server: <IP>
    port: 50488
    uuid: <UUID>
    udp: true
    flow: xtls-rprx-vision
    tls: true
    servername: www.tesla.com
    client-fingerprint: chrome
    reality-opts:
      public-key: <PUBLIC_KEY>
      short-id: <SHORT_ID>

  - name: BWG
    type: vless
    server: <IP>
    port: 30439
    uuid: <UUID>
    udp: true
    flow: xtls-rprx-vision
    tls: true
    servername: www.tesla.com
    client-fingerprint: chrome
    reality-opts:
      public-key: <PUBLIC_KEY>
      short-id: <SHORT_ID>

# ====================================================================
# 2. DNS
# ====================================================================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  use-system-hosts: false
  respect-rules: true
  prefer-h3: false

  # 只用于解析 DoH 服务器、代理服务器域名等 bootstrap 场景。
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1

  # 代理节点服务器名解析走国内 DNS，避免代理服务器自身解析递归走代理。
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 默认 DNS 偏国内，保证国内网站和应用可用；AI/国外规则会在 nameserver-policy 中改走对应代理 DoH。
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: false

  nameserver-policy:
    "rule-set:ai-openai":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "rule-set:ai-anthropic":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "rule-set:tixxin-ai-core":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP

    "+.openai.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.chatgpt.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.oaistatic.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.oaiusercontent.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.anthropic.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.claude.ai":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.claude.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP

    "rule-set:proxy":
      - https://1.1.1.1/dns-query#Tixxin
      - https://8.8.8.8/dns-query#Tixxin
    "rule-set:direct":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:steam":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:steam-cn":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:tixxin-lan":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:tixxin-game-direct":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:tixxin-steam-direct":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:tixxin-cn-direct":
      - 223.5.5.5
      - 119.29.29.29

    "+.baidu.com":
      - 223.5.5.5
      - 119.29.29.29
    "+.qq.com":
      - 223.5.5.5
      - 119.29.29.29
    "+.weixin.qq.com":
      - 223.5.5.5
      - 119.29.29.29
    "+.bilibili.com":
      - 223.5.5.5
      - 119.29.29.29

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "dns.msftncsi.com"
    - "connectivitycheck.gstatic.com"
    - "captive.apple.com"
    - "time.*.com"
    - "ntp.*.com"
    - "+.qq.com"
    - "+.weixin.qq.com"
    - "+.servicewechat.com"
    - "+.qpic.cn"
    - "+.gtimg.com"
    - "+.tencent.com"
    - "+.myqcloud.com"
    - "+.steamcontent.com"
    - "+.steamserver.net"
    - "+.steamusercontent.com"
    - "+.steampowered.com"
    - "+.steamcommunity.com"
    - "+.steamstatic.com"
    - "+.s.team"
    - "+.pubg.com"
    - "+.krafton.com"
    - "+.kraftonid.com"
    - "+.playbattlegrounds.com"
    - "+.easyanticheat.net"
    - "+.eac-cdn.com"

# ====================================================================
# 3. 策略组
# ====================================================================
proxy-groups:
  - name: Tixxin-ISP
    type: select
    proxies:
      - BWGISP

  - name: Tixxin
    type: select
    proxies:
      - BWG

  # 兜底默认走 BWG，不走住宅，避免国内漏网流量被送去 ISP 导致打不开。
  - name: 漏网之鱼
    type: select
    proxies:
      - Tixxin
      - Tixxin-ISP
      - DIRECT

# ====================================================================
