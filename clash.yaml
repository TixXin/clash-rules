# ====================================================================
# Clash Party / Mihomo optimized profile - fixed DIRECT timeout
# 目标：
# 1. ChatGPT / Codex / Claude / Anthropic 全部走住宅 ISP 出口 BWGISP
# 2. 其它国外流量默认走 BWG 机房出口
# 3. 国内网站、国内应用、国内游戏、PUBG、Steam 全部直连
# 4. DNS / IP 检测站和 AI 域名强制走代理 DNS，降低 DNS 泄露
# 5. DIRECT 使用国内测速 URL，避免默认国外测速地址导致直连超时
# ====================================================================

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  mtu: 1500
  dns-hijack:
    - any:53
    - tcp://any:53

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
  force-domain:
    - "+.openai.com"
    - "+.chatgpt.com"
    - "+.anthropic.com"
    - "+.claude.ai"
    - "+.claude.com"
    - "+.net.coffee"
    - "+.dnsleaktest.com"
    - "+.browserleaks.com"
    - "+.ipleak.net"
  skip-domain:
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.steamcontent.com"
    - "+.steamserver.net"
    - "+.pubg.com"
    - "+.krafton.com"

# ====================================================================
# 1. 节点配置
# ====================================================================
proxies:
  - name: BWGISP
    type: vless
    server: <IP>
    port: 50488
    uuid: <UUID>
    udp: true
    flow: xtls-rprx-vision
    tls: true
    servername: www.tesla.com
    client-fingerprint: chrome
    reality-opts:
      public-key: <PUBLIC_KEY>
      short-id: <SHORT_ID>

  - name: BWG
    type: vless
    server: <IP>
    port: 30439
    uuid: <UUID>
    udp: true
    flow: xtls-rprx-vision
    tls: true
    servername: www.tesla.com
    client-fingerprint: chrome
    reality-opts:
      public-key: <PUBLIC_KEY>
      short-id: <SHORT_ID>


# ====================================================================
# 2. DNS
# ====================================================================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  use-system-hosts: false
  respect-rules: true
  prefer-h3: false

  # 仅用于 bootstrap；代理节点和主要 DoH 地址都是 IP，正常不会出现在 DNS 泄露测试中。
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 代理节点是 IP，这里保留国内 DNS 作为兜底 bootstrap。
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 默认 DNS 走代理 DoH，国外未命中域名不暴露国内 DNS。
  nameserver:
    - https://1.1.1.1/dns-query#Tixxin-ISP
    - https://8.8.8.8/dns-query#Tixxin-ISP

  # 修复 DIRECT 超时/国内直连解析异常：直连域名仍使用国内 DNS。
  # DNS / IP 检测站和 AI 域名会在 nameserver-policy 中单独强制走代理 DNS。
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: false

  nameserver-policy:
    # AI / IP / DNS 检测站强制住宅 ISP DNS。
    "rule-set:ai-openai":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "rule-set:ai-anthropic":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "rule-set:tixxin-ai-core":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "rule-set:tixxin-ip-check":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP

    "+.openai.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.chatgpt.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.oaistatic.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.oaiusercontent.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.anthropic.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.claude.ai":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.claude.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.net.coffee":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.dnsleaktest.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.browserleaks.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.ipleak.net":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.ip138.com":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.ipip.net":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP
    "+.ip.sb":
      - https://1.1.1.1/dns-query#Tixxin-ISP
      - https://8.8.8.8/dns-query#Tixxin-ISP

    # 普通国外规则走 BWG DNS。
    "rule-set:proxy":
      - https://1.1.1.1/dns-query#Tixxin
      - https://8.8.8.8/dns-query#Tixxin

    # 国内/游戏/Steam 直连规则使用国内 DNS，保证 DIRECT 和国内 CDN 正常。
    "rule-set:direct":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:steam":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:steam-cn":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:tixxin-lan":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:tixxin-game-direct":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:tixxin-steam-direct":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:tixxin-cn-direct":
      - 223.5.5.5
      - 119.29.29.29

    "+.baidu.com":
      - 223.5.5.5
      - 119.29.29.29
    "+.qq.com":
      - 223.5.5.5
      - 119.29.29.29
    "+.weixin.qq.com":
      - 223.5.5.5
      - 119.29.29.29
    "+.bilibili.com":
      - 223.5.5.5
      - 119.29.29.29

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "dns.msftncsi.com"
    - "connectivitycheck.gstatic.com"
    - "captive.apple.com"
    - "time.*.com"
    - "ntp.*.com"
    - "+.qq.com"
    - "+.weixin.qq.com"
    - "+.servicewechat.com"
    - "+.qpic.cn"
    - "+.gtimg.com"
    - "+.tencent.com"
    - "+.myqcloud.com"
    - "+.steamcontent.com"
    - "+.steamserver.net"
    - "+.steamusercontent.com"
    - "+.steampowered.com"
    - "+.steamcommunity.com"
    - "+.steamstatic.com"
    - "+.s.team"
    - "+.pubg.com"
    - "+.krafton.com"
    - "+.kraftonid.com"
    - "+.playbattlegrounds.com"
    - "+.easyanticheat.net"
    - "+.eac-cdn.com"

# ====================================================================
# 3. 策略组
# ====================================================================
proxy-groups:
  # 自定义 GLOBAL，使用国内可达测速 URL，避免 DIRECT 用默认国外 URL 测速超时。
  - name: GLOBAL
    type: select
    proxies:
      - 漏网之鱼
      - Tixxin
      - Tixxin-ISP
      - DIRECT
      - BWG
      - BWGISP
    url: http://connectivitycheck.platform.hicloud.com/generate_204
    interval: 300

  - name: Tixxin-ISP
    type: select
    proxies:
      - BWGISP
    url: http://connectivitycheck.platform.hicloud.com/generate_204
    interval: 300

  - name: Tixxin
    type: select
    proxies:
      - BWG
    url: http://connectivitycheck.platform.hicloud.com/generate_204
    interval: 300

  # 兜底不放 DIRECT，避免误选后未知域名直连或触发本地 DNS。
  - name: 漏网之鱼
    type: select
    proxies:
      - Tixxin
      - Tixxin-ISP
    url: http://connectivitycheck.platform.hicloud.com/generate_204
    interval: 300

